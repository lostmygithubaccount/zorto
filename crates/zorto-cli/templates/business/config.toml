# Site configuration — edit these values for your business
base_url = "https://example.com"
title = "My Business"
generate_llms_txt = false

compile_sass = true
slugify.paths = "safe"

[markdown]
highlight_code = false
smart_punctuation = true
external_links_target_blank = true
external_links_no_follow = false
external_links_no_referrer = false

[extra]
# Brand
logo_text = "My Business"
# logo_image = "/logo.png"
author = "Your Name"
favicon = "/favicon.png"
favicon_mimetype = "image/png"

# Fonts (Google Fonts families)
heading_font = "Inter"
heading_weights = "600;700;800"
body_font = "Inter"
body_weights = "400;500;600"

# Navigation
menu_items = [
  { name = "Services", url = "#services" },
  { name = "How It Works", url = "#how-it-works" },
  { name = "About", url = "#about" },
  { name = "Contact", url = "#contact" },
]

# Hero section
hero_title = "Your Business Headline"
hero_subtitle = "A short description of what you do and why customers should choose you."
hero_cta = "Get Started"
hero_cta_url = "#contact"

# Services / offerings
services_heading = "Our Services"
services_subheading = "What we offer."
services = [
  { name = "Service One", icon = "star", description = "Description of your first service." },
  { name = "Service Two", icon = "shield", description = "Description of your second service." },
  { name = "Service Three", icon = "bolt", description = "Description of your third service." },
]

# How it works
