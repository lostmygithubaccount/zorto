{% extends "base.html" %}

{% block title %}404 | {{ config.title }}{% endblock title %}

{% block content %}
<div class="matrix-404">
    <canvas id="matrix-canvas"></canvas>
    <div class="matrix-404__content">
        <h1>404</h1>
        <p>page not found</p>
        <a href="{{ config.base_url }}" class="button">&larr; back home</a>
    </div>
</div>

<style>
.matrix-404 {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    z-index: 10;
}

#matrix-canvas {
    display: none;
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
}

.matrix-404__content {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 40px;
    background: rgba(15, 13, 26, 0.85);
    border: 1px solid var(--accent-alpha-20);
    border-radius: 8px;
    backdrop-filter: blur(4px);
}

.matrix-404__content h1 {
    font-size: 6rem;
    margin: 0;
    color: var(--accent);
    text-shadow: 0 0 30px var(--accent-alpha-70);
    display: block;
    justify-content: center;
}

.matrix-404__content p {
    font-size: 1.5rem;
    color: var(--accent-secondary);
    margin: 10px 0 30px;
    text-shadow: 0 0 20px var(--accent-secondary-alpha-20);
}
</style>

<script>
(function() {
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');

    // Colors from the theme
    const colors = [
        'rgba(167, 139, 250, ',  // violet/purple (primary)
        'rgba(34, 211, 238, ',   // cyan (secondary)
    ];

    // Characters: binary
    const chars = '01';
    const charArray = chars.split('');

    let fontSize = 14;
    let columns;
    let drops = [];

    function initMatrix() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        columns = Math.floor(canvas.width / fontSize);
        drops = [];
        for (let i = 0; i < columns; i++) {
            drops[i] = Math.random() * -100;
        }
    }

    function draw() {
        // Semi-transparent background for trail effect
        ctx.fillStyle = 'rgba(15, 13, 26, 0.05)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.font = fontSize + 'px monospace';

        for (let i = 0; i < drops.length; i++) {
            // Random character
            const char = charArray[Math.floor(Math.random() * charArray.length)];

            // Alternate colors with varying opacity
            const colorBase = colors[i % 2];
            const opacity = 0.3 + Math.random() * 0.7;
            ctx.fillStyle = colorBase + opacity + ')';

            // Draw character
            ctx.fillText(char, i * fontSize, drops[i] * fontSize);

            // Reset drop randomly after passing canvas
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                drops[i] = 0;
            }
            drops[i]++;
        }
    }

    // Initialize
    canvas.style.display = 'block';
    initMatrix();

    // Animation loop (throttled for slower fall)
    let animationId;
    let lastTime = 0;
    const fps = 20; // Lower = slower
    const interval = 1000 / fps;

    function animate(currentTime) {
        animationId = requestAnimationFrame(animate);
        const delta = currentTime - lastTime;
        if (delta < interval) return;
        lastTime = currentTime - (delta % interval);
        draw();
    }
    animate(0);

    // Handle resize
    let resizeTimeout;
    window.addEventListener('resize', function() {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(initMatrix, 100);
    });

    // Respect reduced motion preference
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
        cancelAnimationFrame(animationId);
        ctx.fillStyle = 'rgba(15, 13, 26, 1)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
})();
</script>
{% endblock content %}
