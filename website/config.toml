# zorto.dev: zorto configuration
base_url = "https://zorto.dev"
title = "Zorto"
description = "The AI-native static site generator (SSG) with executable code blocks."
theme = "zorto"
generate_feed = true
generate_llms_txt = true
generate_md_files = true
compile_all_themes = true

[[content_dirs]]
path = "../docs"
url_prefix = "docs"
template = "docs.html"
section_template = "docs-section.html"
sort_by = "title"
rewrite_links = true

[markdown]
highlight_code = true
insert_anchor_links = "right"
external_links_target_blank = true
external_links_no_follow = true
external_links_no_referrer = true
smart_punctuation = true

[extra]
logo_image = "/zorto-mark-transparent.png"
logo_text = "Zorto"
logo_tld = ""
author = "Cody"
default_og_image = "zorto-logo-dark.png"
favicon = "/zorto-favicon-32.png"
favicon_mimetype = "image/png"
enable_md_fab = true
md_fab_exclude = []

menu_items = [
  { name = "Getting started", url = "/docs/getting-started/" },
  { name = "Concepts", url = "/docs/concepts/" },
  { name = "How-to", url = "/docs/how-to/" },
  { name = "Reference", url = "/docs/reference/" },
]

menu_items_right = [
  { name = "llms.txt", url = "/llms.txt" },
  { name = "Blog", url = "/posts" },
]

social_links = [
  { name = "GitHub", url = "https://github.com/dkdc-io/zorto", icon = "github" },
]

hero_title = "Zorto"
hero_subtitle = "The AI-native static site generator (SSG) with executable code blocks."
hero_actions = [
  { name = "Getting started", url = "/docs/getting-started/", style = "default" },
  { name = "Concepts", url = "/docs/concepts/", style = "outline" },
  { name = "How-to", url = "/docs/how-to/", style = "outline" },
  { name = "Reference", url = "/docs/reference/", style = "outline" },
]

features = [
  { name = "Free & open source", description = "MIT-licensed forever.", url = "/docs/concepts/open-source/" },
  { name = "AI-native", description = "Explicit contracts, compiler-like quality checks, llms.txt for consumption.", url = "/docs/concepts/ai-native/" },
  { name = "Executable code blocks", description = "Run Python and Bash at build time. Output rendered inline.", url = "/docs/concepts/executable-code/" },
  { name = "Fast", description = "Written in Rust. Build your site in milliseconds.", url = "/docs/concepts/fast/" },
  { name = "Callouts", description = "GitHub-style callout alerts: note, tip, warning, caution, important.", url = "/docs/concepts/callouts/" },
  { name = "Shortcodes", description = "Built-in tabs, figures, diagrams, embeds, and more. No HTML in markdown.", url = "/docs/concepts/shortcodes/" },
  { name = "Blog, events, and more", description = "Sections with date sorting, pagination, and taxonomy support.", url = "/docs/concepts/blog/" },
  { name = "Themes", description = "Four built-in themes with light/dark mode. Override templates and styles locally.", url = "/docs/concepts/themes/" },
  { name = "Live reload", description = "Dev server with automatic rebuilds and instant browser refresh.", url = "/docs/concepts/live-reload/" },
]

copyright_html = '<a href="/">Zorto</a> by <a href="https://dkdc.io" target="_blank" rel="noopener">dkdc.io</a> via <a href="https://zorto.dev" target="_blank" rel="noopener">Zorto</a>'
