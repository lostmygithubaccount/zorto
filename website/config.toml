# zorto.dev: zorto configuration
base_url = "https://zorto.dev"
title = "zorto.dev"
theme = "dkdc"
generate_llms_txt = false

[markdown]
highlight_code = true
insert_anchor_links = "right"
external_links_target_blank = true
external_links_no_follow = true
external_links_no_referrer = true
smart_punctuation = true

[extra]
logo_image = "https://dkdc.atl1.cdn.digitaloceanspaces.com/images/logos/dkdc2-mark-transparent.png"
logo_text = "zorto"
logo_tld = ".dev"
author = "Cody"
default_og_image = "dkdc2-logo-dark.png"
favicon = "/dkdc2-favicon-32.png"
favicon_mimetype = "image/png"

menu_items = [
  { name = "getting started", url = "/docs/getting-started/" },
  { name = "concepts", url = "/docs/concepts/" },
  { name = "how-to", url = "/docs/how-to/" },
  { name = "reference", url = "/docs/reference/" },
]

menu_items_right = [
  { name = "blog", url = "/posts" },
]

[[extra.social_links]]
name = "GitHub"
url = "https://github.com/dkdc-io/zorto"
icon = "github"

hero_title = "Zorto"
hero_subtitle = "A fast static site generator with executable code blocks."
hero_actions = [
  { name = "Get started", url = "/docs/getting-started/", style = "default" },
  { name = "GitHub", url = "https://github.com/dkdc-io/zorto", style = "outline", external = true },
]

features = [
  { name = "Fast", description = "Written in Rust. Render your website in milliseconds." },
  { name = "AI-native", description = "Built for AI to create your website in minutes & maintain it with ease." },
  { name = "Executable code blocks", description = "Run Python and Bash at build time. Output rendered inline." },
  { name = "Built-in themes", description = "Ship with dkdc, light, and dark themes. Override anything locally." },
  { name = "Shortcodes & callouts", description = "Built-in note, details, figure, youtube, mermaid shortcodes. GitHub-style callout alerts." },
  { name = "Free & open source", description = "MIT-licensed forever." },
]

copyright_html = '<a href="/">Zorto</a> by <a href="https://dkdc.dev" target="_blank" rel="noopener">dkdc.dev</a> via <a href="https://zorto.dev" target="_blank" rel="noopener">Zorto</a>'
