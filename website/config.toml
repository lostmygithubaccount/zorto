# zorto.dev: zorto configuration
base_url = "https://zorto.dev"
title = "Zorto"
description = "The AI-native static site generator (SSG) with executable code blocks & more."
theme = "zorto"
generate_feed = true
generate_llms_txt = true
generate_md_files = true
compile_all_themes = true

[[content_dirs]]
path = "../docs"
url_prefix = "docs"
template = "docs.html"
section_template = "docs-section.html"
sort_by = "title"
rewrite_links = true

[markdown]
highlight_code = true
insert_anchor_links = "right"
external_links_target_blank = true
external_links_no_follow = true
external_links_no_referrer = true
smart_punctuation = true

[extra]
logo_image = "/zorto-mark-transparent.png"
logo_text = "Zorto"
logo_tld = ""
author = "Cody"
default_og_image = "zorto-logo-dark.png"
favicon = "/zorto-favicon-32.png"
favicon_mimetype = "image/png"
enable_md_fab = true
md_fab_exclude = []
search_database_url = "/data/site.ddb"
search_database_file = "site.ddb"
search_database_schema = "site"
search_runtime_url = "/js/data-app-runtime.js"

menu_items = [
  { name = "Getting started", url = "/docs/getting-started/" },
  { name = "Concepts", url = "/docs/concepts/" },
  { name = "How-to", url = "/docs/how-to/" },
  { name = "Reference", url = "/docs/reference/" },
]

menu_items_right = [
  { name = "llms.txt", url = "/llms.txt" },
  { name = "Analytics", url = "/analytics/" },
  { name = "Blog", url = "/posts" },
  { name = "Presentations", url = "/presentations/" },
]

social_links = [
  { name = "GitHub", url = "https://github.com/dkdc-io/zorto", icon = "github" },
]

hero_title = "Zorto"
hero_subtitle = "The AI-native static site generator (SSG) with executable code blocks & more."
hero_actions = [
  { name = "Get started", url = "/docs/getting-started/", style = "default" },
  { name = "GitHub", url = "https://github.com/dkdc-io/zorto", style = "outline", external = true },
]

features = [
  { name = "Slide decks", description = "Build presentation decks from markdown: one file per slide, weight-ordered, template-driven, and easy for humans or agents to edit.", url = "/docs/concepts/presentations/" },
  { name = "Executable code blocks", description = "Run Python and Bash at build time. Matplotlib, Plotly, Altair, and Seaborn charts rendered inline. Output baked into static HTML.", url = "/docs/concepts/executable-code/" },
  { name = "Fast", description = "Written in Rust. Sites build in milliseconds. Live reload with instant browser refresh during development.", url = "/docs/concepts/fast/" },
  { name = "16 themes", description = "Built-in themes with light and dark mode. Switch instantly. Override any template or style locally.", url = "/docs/concepts/themes/" },
  { name = "AI-native", description = "Your site is markdown + config. AI agents can read, edit, and build it. AGENTS.md contracts, zorto check for validation, llms.txt for consumption.", url = "/docs/concepts/ai-native/" },
  { name = "Shortcodes & callouts", description = "Tabs, figures, diagrams, callout alerts, code includes, and more. Rich content without HTML in your markdown.", url = "/docs/concepts/shortcodes/" },
  { name = "Blog & docs", description = "Sections with date sorting, pagination, taxonomies, and search. Blog, documentation, and landing page templates included.", url = "/docs/concepts/blog/" },
  { name = "Python & Rust", description = "Install via uv, pip, or cargo. Use as a CLI, Python library, or Rust crate. MIT-licensed forever.", url = "/docs/concepts/open-source/" },
  { name = "Built-in search", description = "DuckDB-backed client-side search. The public site data lives in site.ddb and is queried locally in the browser.", url = "/docs/concepts/search/" },
  { name = "Data apps", description = "Ship local DuckDB data with static pages, lazy-load browser runtime only where needed, and build dashboards from HTML, CSS, and JavaScript.", url = "/docs/concepts/data-apps/" },
]

copyright_html = '<a href="/">Zorto</a> by <a href="https://dkdc.io" target="_blank" rel="noopener">dkdc.io</a> via <a href="https://zorto.dev" target="_blank" rel="noopener">Zorto</a>'
