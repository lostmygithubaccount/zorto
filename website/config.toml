# zorto.dev: zorto configuration
base_url = "https://zorto.dev"
title = "Zorto"
description = "The AI-native static site generator (SSG) with executable code blocks."
theme = "zorto"
generate_llms_txt = true
generate_md_files = true

[[content_dirs]]
path = "../docs"
url_prefix = "docs"
template = "docs.html"
section_template = "docs-section.html"
sort_by = "title"
rewrite_links = true

[markdown]
highlight_code = true
insert_anchor_links = "right"
external_links_target_blank = true
external_links_no_follow = true
external_links_no_referrer = true
smart_punctuation = true

[extra]
logo_image = "/zorto-mark-transparent.png"
logo_text = "Zorto"
logo_tld = ""
author = "Cody"
default_og_image = "zorto-logo-dark.png"
favicon = "/zorto-favicon-32.png"
favicon_mimetype = "image/png"
enable_md_fab = true
md_fab_exclude = ["/"]

menu_items = [
  { name = "Getting started", url = "/docs/getting-started/" },
  { name = "Concepts", url = "/docs/concepts/" },
  { name = "How-to", url = "/docs/how-to/" },
  { name = "Reference", url = "/docs/reference/" },
]

menu_items_right = [
  { name = "llms.txt", url = "/llms.txt" },
  { name = "Blog", url = "/posts" },
]

social_links = [
  { name = "GitHub", url = "https://github.com/dkdc-io/zorto", icon = "github" },
]

hero_title = "Zorto"
hero_subtitle = "The AI-native static site generator (SSG) with executable code blocks."
hero_actions = [
  { name = "Getting started", url = "/docs/getting-started/", style = "default" },
  { name = "Concepts", url = "/docs/concepts/", style = "outline" },
  { name = "How-to", url = "/docs/how-to/", style = "outline" },
  { name = "Reference", url = "/docs/reference/", style = "outline" },
]

features = [
  { name = "Fast", description = "Written in Rust. Render your website in milliseconds." },
  { name = "AI-native", description = "Built for AI to create your website in minutes & maintain it with ease." },
  { name = "Executable code blocks", description = "Run Python and Bash at build time. Output rendered inline." },
  { name = "Built-in themes", description = "Ship with zorto, dkdc, light, and dark themes. Override anything locally." },
  { name = "Shortcodes & callouts", description = "Built-in note, details, figure, youtube, mermaid shortcodes. GitHub-style callout alerts." },
  { name = "Free & open source", description = "MIT-licensed forever." },
]

copyright_html = '<a href="/">Zorto</a> by <a href="https://dkdc.io" target="_blank" rel="noopener">dkdc.io</a> via <a href="https://zorto.dev" target="_blank" rel="noopener">Zorto</a>'
