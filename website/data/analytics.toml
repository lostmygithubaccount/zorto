[dashboard]
database_url = "/data/site.ddb"
database_file = "site.ddb"
database_schema = "site"
duckdb_module_url = "https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm@1.33.1-dev45.0/+esm"
plotly_url = "https://cdn.jsdelivr.net/npm/plotly.js-dist-min@3.4.0/plotly.min.js"
load_label = "Load analytics"
loaded_label = "analytics loaded"

[[views]]
id = "overview"
label = "Overview"

[[views]]
id = "content"
label = "Content"

[[views]]
id = "build"
label = "Build"

[[views]]
id = "data"
label = "Data"

[[kpis]]
id = "commits"
label = "Commits indexed"

[[kpis]]
id = "content_files"
label = "Content files"

[[kpis]]
id = "build_output"
label = "Build output"

[[kpis]]
id = "repo_state"
label = "Repo state"

[[kpis]]
id = "terms"
label = "Terms indexed"

[[kpis]]
id = "generated"
label = "Generated"

[[signals]]
id = "build_pulse"
label = "Build pulse"

[[signals]]
id = "docs_health"
label = "Docs health"

[[signals]]
id = "working_tree"
label = "Working tree"

[[panels]]
id = "commit-activity"
