name: Release Python

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true
      publish:
        description: "Publish to PyPI (default false — workflow_dispatch is verify-only)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    uses: dkdc-io/.github/.github/workflows/release-python.yml@v1
    permissions:
      contents: read

  publish:
    name: Publish to PyPI
    needs: build
    if: github.event_name == 'push' || inputs.publish
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
